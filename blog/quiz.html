  16: [["🌿","47% less plastic"],["♻️","TerraCycle compatible"],["🔌","USB-C charging"],["🎛️","5 cleaning modes"]],
  17: [["🔵","Sonic technology"],["🌸","Rose colorway"],["🛡️","Pressure sensor"],["💰","Best Sonicare price"]],
};

let answers = {};
let currentQ = 0;
let scores = {};

PRODUCTS.forEach(p => scores[p.id] = 0);

function renderQuestion(index) {
  const q = QUESTIONS[index];
  const pct = Math.round((index / QUESTIONS.length) * 100);
  document.getElementById("progressLabel").textContent = `Question ${index+1} of ${QUESTIONS.length}`;
  document.getElementById("progressPct").textContent = pct + "%";
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("qIcon").textContent = q.icon;
  document.getElementById("qNumber").textContent = q.number;
  document.getElementById("qText").textContent = q.text;
  document.getElementById("qSub").textContent = q.sub;

  const container = document.getElementById("options");
  container.innerHTML = "";
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerHTML = `
      <div class="option-icon">${opt.icon}</div>
      <div class="option-text"><strong>${opt.label}</strong><span>${opt.desc}</span></div>
      <div class="option-check"></div>`;
    btn.onclick = () => selectOption(btn, opt, q.options);
    container.appendChild(btn);
  });

  const next = document.getElementById("btnNext");
  next.classList.remove("visible");
  next.textContent = index === QUESTIONS.length - 1 ? "See My Result →" : "Continue →";

  document.getElementById("quizCard").style.animation = "none";
  requestAnimationFrame(() => { document.getElementById("quizCard").style.animation = "fadeUp 0.35s ease"; });
}

function selectOption(btn, opt, allOpts) {
  document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
  btn.classList.add("selected");
  answers[opt.key] = opt.val;
  document.getElementById("btnNext").classList.add("visible");
}

function nextQuestion() {
  applyScores();
  currentQ++;
  if (currentQ >= QUESTIONS.length) {
    showResult();
  } else {
    renderQuestion(currentQ);
  }
}

function applyScores() {
  const q = QUESTIONS[currentQ];
  const ans = answers[q.options[0].key];

  PRODUCTS.forEach(p => {
    let delta = 0;

    if (q.options[0].key === "goal") {
      if (ans === "whitening" && p.whitening) delta += 3;
      if (ans === "gums" && p.sensitive) delta += 2;
      if (ans === "medical" && p.medical.length > 0) delta += 2;
      if (ans === "clean") delta += 1;
    }
    if (q.options[0].key === "sensitivity") {
      if (ans === "high" && p.sensitive) delta += 3;
      if (ans === "medium" && p.sensitive) delta += 1;
    }
    if (q.options[0].key === "medical") {
      if (ans !== "none" && p.medical.includes(ans)) delta += 10;
      if (ans === "none") delta += 1;
    }
    if (q.options[0].key === "app") {
      if (ans === "yes" && p.app) delta += 5;
      if (ans === "no" && !p.app) delta += 2;
    }
    if (q.options[0].key === "battery") {
      if (ans === "long" && p.battery >= 3) delta += 3;
      if (ans === "short" && p.battery <= 2) delta += 1;
      if (ans === "any") delta += 1;
    }
    if (q.options[0].key === "travel") {
      if (ans === "yes" && p.travel) delta += 4;
      if (ans === "no" && !p.travel) delta += 1;
    }
    if (q.options[0].key === "age") {
      if (ans === "young") {
        if (p.price <= 60) delta += 3;
        if (p.id === 17 || p.id === 2) delta += 2;
        if (p.app) delta += 1;
      }
      if (ans === "adult") {
        if (p.price >= 40 && p.price <= 200) delta += 2;
        if (p.sensitive) delta += 1;
      }
      if (ans === "senior") {
        if (p.medical.includes("senior") || p.medical.includes("arthritis")) delta += 5;
        if (p.sensitive) delta += 2;
        if (p.modes <= 3) delta += 1;
      }
      if (ans === "elderly") {
        if (p.medical.includes("senior") || p.medical.includes("arthritis")) delta += 8;
        if (p.modes === 1) delta += 3;
        if (p.price <= 80) delta += 2;
        if (p.sensitive) delta += 2;
      }
    }
    if (q.options[0].key === "modes") {
      if (ans === "simple" && p.modes <= 1) delta += 4;
      if (ans === "few" && p.modes >= 2 && p.modes <= 3) delta += 4;
      if (ans === "many" && p.modes >= 4) delta += 4;
    }
    if (q.options[0].key === "eco") {
      if (ans === "yes" && p.eco) delta += 10;
      if (ans === "maybe" && p.eco) delta += 3;
      if (ans !== "yes" && !p.eco) delta += 1;
    }
    if (q.options[0].key === "budget") {
      const budgets = { "50": [0,50], "100": [50,100], "150": [100,150], "200": [150,200], "200plus": [200,1000] };
      const [min, max] = budgets[ans];
      if (p.price >= min && p.price <= max) delta += 6;
      else if (p.price > max && p.price <= max * 1.5) delta += 3;
    }

    scores[p.id] += delta;
  });
}

function showResult() {
  document.getElementById("progressFill").style.width = "100%";
  document.getElementById("progressPct").textContent = "100%";
  document.getElementById("progressLabel").textContent = "Complete!";
  document.getElementById("quizCard").classList.add("hidden");

  const sorted = [...PRODUCTS].sort((a, b) => scores[b.id] - scores[a.id]);
  const top3 = sorted.slice(0, 3);
  const rankLabels = ["🥇 #1 Best Match", "🥈 #2 Great Choice", "🥉 #3 Also Consider"];
  const rankClasses = ["rank-1", "rank-2", "rank-3"];

  const card = document.getElementById("resultCard");
  card.classList.remove("hidden");
  card.innerHTML = `
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:2rem;margin-bottom:10px;">🦷</div>
      <div style="font-size:1.45rem;font-weight:900;color:#1a1a2e;margin-bottom:6px;">Your Top 3 Picks</div>
      <div style="font-size:0.9rem;color:#666;">Based on your answers — personalized for your exact profile</div>
    </div>
    ${top3.map((p, i) => {
      const reasons = REASONS[p.id].slice(0, 3);
      const features = FEATURES[p.id];
      const isTop = i === 0;
      return `<div class="pick-card${isTop ? " pick-top" : ""}">
        <div class="pick-rank ${rankClasses[i]}">${rankLabels[i]}</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
          <div><div class="pick-name">${p.name}</div><div class="pick-brand">${p.brand}</div></div>
          <div class="pick-price">$${p.price.toFixed(2)}</div>
        </div>
        <ul class="pick-reasons">${reasons.map(r => `<li>${r}</li>`).join("")}</ul>
        ${isTop ? `<div class="features-grid" style="margin-bottom:20px;">${features.map(([ic, lb]) => `<div class="feature-chip"><span>${ic}</span>${lb}</div>`).join("")}</div>` : ""}
        <a class="btn-amazon" href="${p.url}" target="_blank" rel="noopener">${isTop ? "👉 Check Price on Amazon" : "→ Check Price"} — $${p.price.toFixed(2)}</a>
      </div>`;
    }).join("")}
    <button class="btn-retry" onclick="resetQuiz()">↩ Retake the quiz</button>
    <p class="disclaimer">As an Amazon Associate, DailySmileCare earns from qualifying purchases.</p>`;
}

function resetQuiz() {
  answers = {};
  currentQ = 0;
  PRODUCTS.forEach(p => scores[p.id] = 0);
  document.getElementById("resultCard").classList.add("hidden");
  document.getElementById("quizCard").classList.remove("hidden");
  renderQuestion(0);
}

renderQuestion(0);
</script>
